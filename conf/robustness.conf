# Robustness-oriented config: valid syntax with edge formatting and directive combinations
# This file is intended to stress parsing order, spacing, duplicates, and mixed options.

server {
    listen 8180;
    client_max_body_size 0;
    error_pages 400 var/www/errors/400.html;
    error_pages 404 var/www/errors/404.html;
    error_pages 500 var/www/errors/500.html;

    # Standard static route with unusual ordering and duplicates
    location / {
        autoindex off;
        allow_methods GET POST GET;
        root var/www/html;
    }

    # Rewrite stress test: redirect + permanent + internal rewrite
    location /rewrite {
        rewrite ^/old-page$ /new-page redirect;
        rewrite ^/legacy$ /moved permanent;
        rewrite ^/internal$ /hidden internal;
        allow_methods GET;
        root var/www/html;
        autoindex on;
    }

    # Upload directives in one place
    location /upload {
        allow_methods POST DELETE;
        upload_auth off;
        upload_path var/www/html;
        autoindex on;
        root var/www/html;
    }
}

server {
	listen 8181;
	client_max_body_size 1048576;
	error_pages 413 var/www/errors/413.html;

	# Mixed tabs/spaces + multiple CGI declarations with method filters
	location /cgi-bin {
		allow_methods GET POST DELETE;
		cgi .sh /bin/sh GET POST;
		cgi .pl /bin/sh;
		cgi .py /bin/sh POST;
		root var/www/html;
		autoindex on;
	}
}

server {
    listen 8182;

    # Minimal server with only required location/root combo
    location /minimal {
        allow_methods GET;
        root var/www/html;
        autoindex off;
    }
}
